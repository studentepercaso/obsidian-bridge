interface:
  display_name: "Use Obsidian Vault"
  short_description: "Read, cite, and safely manage authorized Obsidian notes"
  default_prompt: "Use $use-obsidian-vault to inspect the exact vault mode and permissions, read recent failures, show and await confirmation for protected create/append, internally verify autonomous or managed previews, commit only an explicitly granted operation once, read back the result, and never use permanent delete, shell, eval, or arbitrary Obsidian commands."
