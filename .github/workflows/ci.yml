name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node 20 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - name: Install bridge dependencies
        run: npm ci

      - name: Install companion dependencies
        run: npm --prefix companion/obsidian-bridge-control ci

      - name: Run all checks
        run: npm run check:all

      - name: Verify generated assets are committed
        run: git diff --exit-code -- dist/server.mjs companion/obsidian-bridge-control/main.js
